<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AdsCompetitor</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container auth-container">
        <header class="auth-header">
            <h1>🎯 AdsCompetitor</h1>
            <p class="subtitle">Create your account</p>
        </header>

        <div class="auth-card card">
            <h2>Sign Up</h2>
            <p class="step-subtitle">Get started with AI-powered ad generation</p>

            <div id="authMessage" class="auth-message" style="display: none;"></div>

            <form id="signupForm" class="auth-form">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" placeholder="Jane Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required minlength="8">
                    <small>At least 8 characters</small>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password *</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Create Account</button>
                </div>
            </form>

            <p class="auth-footer">
                Already have an account? <a href="{{ url_for('login') }}">Log in</a><br>
                <a href="{{ url_for('pricing') }}">View pricing plans</a> · <a href="{{ url_for('index') }}">Home</a>
            </p>
        </div>
    </div>

    {% if firebase_config %}
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {{ firebase_config | tojson }};
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function showMsg(text, isError) {
            const el = document.getElementById('authMessage');
            el.textContent = text;
            el.className = 'auth-message ' + (isError ? 'auth-error' : 'auth-success');
            el.style.display = 'block';
        }
        function setLoading(loading) {
            const btn = document.getElementById('submitBtn');
            btn.disabled = loading;
            btn.textContent = loading ? 'Creating account...' : 'Create Account';
        }

        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            if (!name || !email || !password) {
                showMsg('Name, email, and password are required.', true);
                return;
            }
            if (password !== confirm) {
                showMsg('Passwords do not match.', true);
                return;
            }
            if (password.length < 8) {
                showMsg('Password must be at least 8 characters.', true);
                return;
            }
            setLoading(true);
            showMsg('', false);
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, password);
                if (name) await cred.user.updateProfile({ displayName: name });
                const idToken = await cred.user.getIdToken();
                const res = await fetch('{{ url_for("auth_firebase") }}', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_token: idToken })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = data.redirect || '/';
                    return;
                }
                showMsg(data.error || 'Sign up failed', true);
            } catch (err) {
                const msg = err.code === 'auth/email-already-in-use' ? 'An account with this email already exists.' :
                    err.code === 'auth/weak-password' ? 'Password is too weak.' :
                    err.code === 'auth/invalid-email' ? 'Invalid email address.' :
                    err.message || 'Sign up failed';
                showMsg(msg, true);
            } finally {
                setLoading(false);
            }
        });
    </script>
    {% else %}
    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var p = document.getElementById('password').value;
            var c = document.getElementById('confirm_password').value;
            if (p !== c) {
                document.getElementById('authMessage').textContent = 'Passwords do not match.';
                document.getElementById('authMessage').className = 'auth-message auth-error';
                document.getElementById('authMessage').style.display = 'block';
                return;
            }
            document.getElementById('authMessage').textContent = 'Firebase is not configured. Set FIREBASE_* in .env to enable sign up.';
            document.getElementById('authMessage').className = 'auth-message auth-error';
            document.getElementById('authMessage').style.display = 'block';
        });
    </script>
    {% endif %}
</body>
</html>
