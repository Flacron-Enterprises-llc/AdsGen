<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access - AdsCompetitor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container auth-container" style="max-width: 400px; margin-top: 80px;">
        <div class="auth-card card">
            <h2>Admin Access</h2>
            <p class="step-subtitle">Enter the admin password to continue.</p>
            {% if error %}
            <div class="auth-message auth-error">{{ error }}</div>
            {% endif %}
            <form method="POST" action="{{ url_for('admin_verify') }}">
                <div class="form-group">
                    <label for="password">Admin password</label>
                    <input type="password" id="password" name="password" placeholder="Password" required autofocus>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Continue</button>
            </form>
            <p class="auth-footer" style="margin-top: 20px;">
                <a href="{{ url_for('dashboard') }}">Back to app</a>
            </p>
        </div>
    </div>
</body>
</html>
