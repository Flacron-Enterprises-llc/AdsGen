<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AdsCompetitor</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container auth-container">
        <header class="auth-header">
            <h1>🎯 AdsCompetitor</h1>
            <p class="subtitle">Sign in to your account</p>
        </header>

        <div class="auth-card card">
            <h2>Login</h2>
            <p class="step-subtitle">Enter your email and password to continue</p>

            <div id="authMessage" class="auth-message" style="display: none;"></div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <div class="form-group form-group-inline" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember" name="remember" value="1">
                        <span>Remember me</span>
                    </label>
                    <a href="#" id="forgotPasswordLink" class="btn btn-link" style="padding: 0; font-size: 0.9em;">Forgot password?</a>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Sign In</button>
                </div>
            </form>

            <p class="auth-footer">
                Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a><br>
                <a href="{{ url_for('pricing') }}">View pricing plans</a> · <a href="{{ url_for('index') }}">Home</a>
            </p>
        </div>
    </div>

    {% if firebase_config %}
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {{ firebase_config | tojson }};
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function showMsg(text, isError) {
            const el = document.getElementById('authMessage');
            el.textContent = text;
            el.className = 'auth-message ' + (isError ? 'auth-error' : 'auth-success');
            el.style.display = 'block';
        }
        function setLoading(loading) {
            const btn = document.getElementById('submitBtn');
            btn.disabled = loading;
            btn.textContent = loading ? 'Signing in...' : 'Sign In';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) {
                showMsg('Email and password are required.', true);
                return;
            }
            setLoading(true);
            showMsg('', false);
            try {
                const persist = document.getElementById('remember').checked;
                await auth.setPersistence(persist ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION);
                const cred = await auth.signInWithEmailAndPassword(email, password);
                const idToken = await cred.user.getIdToken();
                const res = await fetch('{{ url_for("auth_firebase") }}', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_token: idToken })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = data.redirect || '/';
                    return;
                }
                showMsg(data.error || 'Sign in failed', true);
            } catch (err) {
                const code = err.code || '';
                const msg = code === 'auth/user-not-found' ? 'No account with this email.' :
                    code === 'auth/wrong-password' ? 'Incorrect password.' :
                    code === 'auth/invalid-credential' ? 'Invalid email or password. Check your details or use Forgot password.' :
                    code === 'auth/invalid-email' ? 'Invalid email address.' :
                    err.message || 'Sign in failed';
                showMsg(msg, true);
            } finally {
                setLoading(false);
            }
        });

        document.getElementById('forgotPasswordLink').addEventListener('click', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!email) {
                showMsg('Enter your email above, then click Forgot password.', true);
                return;
            }
            try {
                await auth.sendPasswordResetEmail(email);
                showMsg('Password reset email sent. Check your inbox (and spam).', false);
            } catch (err) {
                const code = err.code || '';
                const msg = code === 'auth/user-not-found' ? 'No account with this email.' :
                    code === 'auth/invalid-email' ? 'Invalid email address.' :
                    err.message || 'Could not send reset email.';
                showMsg(msg, true);
            }
        });
    </script>
    {% else %}
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('authMessage').textContent = 'Firebase is not configured. Set FIREBASE_* in .env to enable login.';
            document.getElementById('authMessage').className = 'auth-message auth-error';
            document.getElementById('authMessage').style.display = 'block';
        });
    </script>
    {% endif %}
</body>
</html>
